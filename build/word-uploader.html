<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word zu Blog Post | Tax and Purpose</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    :root {
      --text: #3C393A;
      --background: #f9e9ea;
      --primary: #D08C7C;
      --secondary: #ebcfc8;
      --accent: #7F2B3F;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      background: var(--background);
      color: var(--text);
      min-height: 100vh;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--accent);
      margin-bottom: 8px;
      font-size: 2.5rem;
      font-weight: 600;
    }

    .subtitle {
      color: var(--text);
      opacity: 0.7;
      margin-bottom: 32px;
      font-size: 1.1rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(127, 43, 63, 0.08);
    }

    .card h3 {
      font-family: 'Playfair Display', serif;
      color: var(--accent);
      margin: 0 0 16px 0;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .upload-area {
      border: 2px dashed var(--primary);
      border-radius: 16px;
      padding: 60px 20px;
      text-align: center;
      background: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent);
      background: var(--secondary);
    }

    .upload-area input { display: none; }

    .upload-icon {
      font-size: 56px;
      margin-bottom: 12px;
    }

    .upload-area p {
      margin: 4px 0;
      color: var(--text);
    }

    .upload-area p strong {
      color: var(--accent);
    }

    .form-group {
      margin: 20px 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--secondary);
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      background: white;
      color: var(--text);
      transition: all 0.2s ease;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(127, 43, 63, 0.1);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .preview {
      display: none;
    }

    .preview h3 {
      margin-top: 0;
    }

    .preview-content {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--secondary);
      padding: 20px;
      border-radius: 12px;
      background: #fdfafa;
    }

    .preview-content h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--accent);
      margin: 0 0 16px 0;
    }

    .preview-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--accent);
      margin: 20px 0 12px 0;
    }

    .preview-content h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      margin: 16px 0 10px 0;
    }

    .preview-content h4 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin: 14px 0 8px 0;
    }

    .preview-content p {
      margin: 0 0 12px 0;
      line-height: 1.6;
    }

    .preview-content ul, .preview-content ol {
      margin: 12px 0;
      padding-left: 24px;
    }

    .preview-content li {
      margin: 6px 0;
      line-height: 1.5;
    }

    .preview-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.9rem;
    }

    .preview-content th, .preview-content td {
      border: 1px solid var(--secondary);
      padding: 10px 12px;
      text-align: left;
    }

    .preview-content th {
      background: var(--secondary);
      font-weight: 600;
      color: var(--accent);
    }

    .preview-content hr {
      border: none;
      border-top: 2px solid var(--secondary);
      margin: 20px 0;
    }

    .preview-content u {
      text-decoration: underline;
    }

    .preview-content mark {
      background-color: #ffeb3b;
      padding: 0 2px;
    }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: #6a243a;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      background: var(--secondary);
      color: var(--text);
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
      margin-left: 12px;
    }

    .btn-secondary:hover {
      background: var(--accent);
      color: white;
    }

    .btn-secondary:disabled {
      border-color: var(--secondary);
      color: var(--text);
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      padding: 16px 20px;
      border-radius: 12px;
      margin: 20px 0;
      display: none;
      font-weight: 500;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
      border: 1px solid #c3e6cb;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
      border: 1px solid #f5c6cb;
    }

    .actions {
      margin-top: 24px;
    }

    .file-name {
      margin-top: 16px;
      padding: 12px 16px;
      background: var(--secondary);
      border-radius: 10px;
      display: none;
      font-weight: 500;
      color: var(--accent);
    }

    /* Logo/branding */
    .brand {
      margin-bottom: 24px;
    }

    .brand img {
      height: 48px;
      width: auto;
    }
  </style>
</head>
<body>
  <div class="brand">
    <img src="/leilalogograph.png" alt="Tax and Purpose">
  </div>

  <h1>Word zu Blog Post</h1>
  <p class="subtitle">Laden Sie Ihr Word-Dokument hoch, um es in einen Blog-Beitrag zu konvertieren.</p>

  <!-- Status messages -->
  <div id="status" class="status"></div>

  <!-- Content (auth handled by parent Dashboard) -->
  <div id="protectedContent">
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📄</div>
      <p><strong>Word-Datei hierher ziehen</strong></p>
      <p>oder klicken zum Auswählen</p>
      <input type="file" id="fileInput" accept=".docx">
    </div>
    <div class="file-name" id="fileName"></div>

    <div class="form-group">
      <label for="title">Titel</label>
      <input type="text" id="title" placeholder="Wird aus Dateiname extrahiert...">
    </div>

    <div class="form-group">
      <label for="summary">Inhalt</label>
      <textarea id="summary" placeholder="Kurze Beschreibung des Artikels..."></textarea>
    </div>

    <div class="form-group">
      <label for="publishDate">Veröffentlichungsdatum</label>
      <input type="datetime-local" id="publishDate">
    </div>

    <div class="preview card" id="preview">
      <h3>Vorschau</h3>
      <div class="preview-content" id="previewContent"></div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="uploadBtn" disabled>
        In Directus hochladen
      </button>
      <button class="btn btn-secondary" id="copyBtn" disabled>
        HTML kopieren
      </button>
    </div>
  </div>

  <script>
    const DIRECTUS_URL = 'https://directus.rapid-works.io';
    const CLIENT_ID = 1; // tax-purpose

    let htmlContent = '';
    let accessToken = sessionStorage.getItem('directus_token');
    let userEmail = sessionStorage.getItem('directus_email');

    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const titleInput = document.getElementById('title');
    const summaryInput = document.getElementById('summary');
    const publishDateInput = document.getElementById('publishDate');
    const preview = document.getElementById('preview');
    const previewContent = document.getElementById('previewContent');
    const uploadBtn = document.getElementById('uploadBtn');
    const copyBtn = document.getElementById('copyBtn');
    const status = document.getElementById('status');

    // Drag and drop
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files[0]) {
        handleFile(e.dataTransfer.files[0]);
      }
    });
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        handleFile(e.target.files[0]);
      }
    });

    async function handleFile(file) {
      if (!file.name.endsWith('.docx')) {
        showStatus('Bitte eine .docx Datei auswählen', 'error');
        return;
      }

      fileName.textContent = '📎 ' + file.name;
      fileName.style.display = 'block';

      // Extract title from filename
      const title = file.name
        .replace('.docx', '')
        .replace(/^\d+\.\s*/, '')
        .replace(/Artikel_/i, '')
        .replace(/_/g, ' ')
        .trim();
      titleInput.value = title;
      summaryInput.value = title;

      // Set default publish date to now
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      publishDateInput.value = now.toISOString().slice(0, 16);

      // Convert DOCX by parsing XML directly (same approach as working upload-word-v3.js)
      try {
        const arrayBuffer = await file.arrayBuffer();

        // Unzip DOCX and extract document.xml
        const zip = await JSZip.loadAsync(arrayBuffer);
        const documentXml = await zip.file('word/document.xml').async('string');

        // Parse XML to HTML
        htmlContent = xmlToHtml(documentXml);

        // Show preview
        previewContent.innerHTML = htmlContent;
        preview.style.display = 'block';

        uploadBtn.disabled = false;
        copyBtn.disabled = false;

        showStatus('Datei erfolgreich konvertiert!', 'success');
      } catch (err) {
        showStatus('Fehler beim Konvertieren: ' + err.message, 'error');
      }
    }

    // Direct XML to HTML conversion (ported from upload-word-v3.js)
    function xmlToHtml(xml) {
      let html = '';
      let skipFirstH1 = false; // Show all headings in preview

      // Extract paragraphs and tables with their positions
      const paragraphRegex = /<w:p[^>]*>[\s\S]*?<\/w:p>/g;
      const tableRegex = /<w:tbl[^>]*>[\s\S]*?<\/w:tbl>/g;

      // Collect all elements with their positions
      const elements = [];

      // Find all tables
      let tableMatch;
      while ((tableMatch = tableRegex.exec(xml)) !== null) {
        elements.push({
          type: 'table',
          index: tableMatch.index,
          content: tableMatch[0]
        });
      }

      // Find all paragraphs (excluding those inside tables)
      let pMatch;
      while ((pMatch = paragraphRegex.exec(xml)) !== null) {
        // Skip if inside a table
        const isInTable = elements.some(e =>
          e.type === 'table' &&
          pMatch.index >= e.index &&
          pMatch.index < e.index + e.content.length
        );
        if (isInTable) continue;

        elements.push({
          type: 'paragraph',
          index: pMatch.index,
          content: pMatch[0]
        });
      }

      // Sort elements by their position in the document
      elements.sort((a, b) => a.index - b.index);

      // Process elements in document order
      for (const element of elements) {
        if (element.type === 'table') {
          html += processTable(element.content);
        } else {
          const pHtml = processParagraph(element.content, skipFirstH1);
          if (pHtml !== null) {
            if (pHtml === 'SKIP_H1') {
              skipFirstH1 = false;
            } else {
              html += pHtml;
            }
          }
        }
      }

      // Group consecutive li items into ul
      html = html.replace(/(<li>[\s\S]*?<\/li>\n)+/g, (match) => {
        return '<ul>\n' + match + '</ul>\n';
      });

      return html;
    }

    function processParagraph(pXml, skipFirstH1) {
      // Extract inner content
      const innerMatch = pXml.match(/<w:p[^>]*>([\s\S]*?)<\/w:p>/);
      if (!innerMatch) return null;
      const pContent = innerMatch[1];

      // Get paragraph style
      const styleMatch = pContent.match(/<w:pStyle w:val="([^"]+)"/);
      const style = styleMatch ? styleMatch[1] : 'Normal';

      // Get all text content with formatting
      const runs = [];
      const runRegex = /<w:r[^>]*>([\s\S]*?)<\/w:r>/g;
      let runMatch;
      while ((runMatch = runRegex.exec(pContent)) !== null) {
        const runContent = runMatch[1];
        const textMatch = runContent.match(/<w:t[^>]*>([^<]*)<\/w:t>/);
        if (textMatch) {
          const isBold = runContent.includes('<w:b/>') || runContent.includes('<w:b ');
          const isItalic = runContent.includes('<w:i/>') || runContent.includes('<w:i ');
          const isUnderline = runContent.includes('<w:u ') || runContent.includes('<w:u/>');
          const isHighlight = runContent.includes('<w:highlight');
          // Check for text color
          const colorMatch = runContent.match(/<w:color w:val="([^"]+)"/);
          const textColor = colorMatch ? colorMatch[1] : null;
          runs.push({ text: textMatch[1], bold: isBold, italic: isItalic, underline: isUnderline, highlight: isHighlight, color: textColor });
        }
      }

      if (runs.length === 0) return null;

      const fullText = runs.map(r => r.text).join('').trim();
      if (!fullText) return null;

      // Check if paragraph is a list item (has numbering properties)
      const isListItem = pContent.includes('<w:numPr>') || style === 'MdListItem' ||
                        style === 'ListParagraph' || style === 'Listenabsatz';

      // Map styles to HTML tags (support both custom Md* and standard Word styles)
      let tag = 'p';
      const styleLower = style.toLowerCase();

      // Heading 1 detection
      if (style === 'MdHeading1' || style === 'Titel' ||
          style === 'Heading1' || style === 'berschrift1' || style === 'berschrift' ||
          styleLower.includes('heading1') || styleLower.includes('heading 1')) {
        if (skipFirstH1) {
          return 'SKIP_H1';
        }
        tag = 'h1';
      // Heading 2 detection
      } else if (style === 'MdHeading2' || style === 'Heading2' || style === 'berschrift2' ||
                 styleLower.includes('heading2') || styleLower.includes('heading 2')) {
        tag = 'h2';
      // Heading 3 detection
      } else if (style === 'MdHeading3' || style === 'Heading3' || style === 'berschrift3' ||
                 styleLower.includes('heading3') || styleLower.includes('heading 3')) {
        tag = 'h3';
      // Heading 4 detection
      } else if (style === 'MdHeading4' || style === 'Heading4' || style === 'berschrift4' ||
                 styleLower.includes('heading4') || styleLower.includes('heading 4')) {
        tag = 'h4';
      // List item detection
      } else if (isListItem) {
        tag = 'li';
      } else if (style === 'MdHr') {
        return '<hr />\n';
      } else if (style === 'MdSpace') {
        return null;
      }

      // Build content with inline formatting
      let content = '';
      const allBold = runs.every(r => r.bold);
      const isHeading = tag.startsWith('h');

      for (const run of runs) {
        let text = run.text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');

        // Apply inline formatting (skip if heading or all runs are bold)
        if (!isHeading && !allBold) {
          if (run.bold) text = `<strong>${text}</strong>`;
          if (run.italic) text = `<em>${text}</em>`;
          if (run.underline) text = `<u>${text}</u>`;
        }
        // Always apply highlight and color (even in headings)
        if (run.highlight) text = `<mark>${text}</mark>`;
        if (run.color && run.color !== '000000' && run.color !== 'auto') {
          text = `<span style="color:#${run.color}">${text}</span>`;
        }
        content += text;
      }

      // If all runs are bold and it's a paragraph, wrap in strong
      if (allBold && tag === 'p') {
        content = `<strong>${content}</strong>`;
      }

      return `<${tag}>${content}</${tag}>\n`;
    }

    function processTable(tableXml) {
      let html = '<table>\n';
      const rowRegex = /<w:tr[^>]*>([\s\S]*?)<\/w:tr>/g;
      let rowMatch;
      let isFirstRow = true;

      while ((rowMatch = rowRegex.exec(tableXml)) !== null) {
        html += '<tr>\n';
        const cellRegex = /<w:tc[^>]*>([\s\S]*?)<\/w:tc>/g;
        let cellMatch;

        while ((cellMatch = cellRegex.exec(rowMatch[1])) !== null) {
          const cellTag = isFirstRow ? 'th' : 'td';
          const textRegex = /<w:t[^>]*>([^<]*)<\/w:t>/g;
          let cellText = '';
          let textMatch;
          while ((textMatch = textRegex.exec(cellMatch[1])) !== null) {
            cellText += textMatch[1];
          }
          html += `<${cellTag}>${cellText.trim()}</${cellTag}>\n`;
        }
        html += '</tr>\n';
        isFirstRow = false;
      }
      html += '</table>\n';
      return html;
    }

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(htmlContent).then(() => {
        showStatus('HTML in Zwischenablage kopiert!', 'success');
      });
    });

    uploadBtn.addEventListener('click', async () => {
      const title = titleInput.value.trim();
      const summary = summaryInput.value.trim();
      const publishDate = publishDateInput.value;

      if (!title) {
        showStatus('Bitte einen Titel eingeben', 'error');
        return;
      }

      // Check if logged in via session cookie fallback
      uploadBtn.disabled = true;
      uploadBtn.textContent = 'Wird hochgeladen...';

	try {
        // Generate slug
        const slug = title
          .toLowerCase()
          .replace(/ä/g, 'ae').replace(/ö/g, 'oe')
          .replace(/ü/g, 'ue').replace(/ß/g, 'ss')
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-|-$/g, '');

        // Convert HTML to Tiptap JSON
        const tiptapJson = htmlToTiptapJson(htmlContent);

        // Build request headers dynamically
        const headers = { 'Content-Type': 'application/json' };
        if (accessToken) {
          headers['Authorization'] = `Bearer ${accessToken}`;
        }

        // Create post
        const postRes = await fetch(`${DIRECTUS_URL}/items/posts`, {
          method: 'POST',
          headers: headers,
          credentials: 'include', 
          body: JSON.stringify({
            title,
            slug,
            content: tiptapJson,
            summary,
            status: 'draft',
            client: CLIENT_ID,
            ...(publishDate && { publish_date: new Date(publishDate).toISOString() })
          })
        });

        if (!postRes.ok) {
          const err = await postRes.text();
          // Check if token expired
          if (postRes.status === 401) {
            accessToken = null;
            userEmail = null;
            sessionStorage.removeItem('directus_token');
            sessionStorage.removeItem('directus_email');
            updateAuthUI();
            throw new Error('Sitzung abgelaufen. Bitte erneut anmelden.');
          }
          throw new Error(err);
        }

        const postData = await postRes.json();
        showStatus(`Erfolgreich hochgeladen! Post ID: ${postData.data.id}`, 'success');

      } catch (err) {
        showStatus('Fehler: ' + err.message, 'error');
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'In Directus hochladen';
      }
    });

    function htmlToTiptapJson(html) {
      // Simple HTML to Tiptap JSON converter
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const content = [];

      function processNode(node) {
        if (node.nodeType === Node.TEXT_NODE) {
          const text = node.textContent;
          if (text.trim()) {
            return { type: 'text', text };
          }
          return null;
        }

        if (node.nodeType === Node.ELEMENT_NODE) {
          const tag = node.tagName.toLowerCase();

          if (tag === 'h1') {
            return { type: 'heading', attrs: { level: 1 }, content: processChildren(node) };
          }
          if (tag === 'h2') {
            return { type: 'heading', attrs: { level: 2 }, content: processChildren(node) };
          }
          if (tag === 'h3') {
            return { type: 'heading', attrs: { level: 3 }, content: processChildren(node) };
          }
          if (tag === 'h4') {
            return { type: 'heading', attrs: { level: 4 }, content: processChildren(node) };
          }
          if (tag === 'p') {
            const children = processChildren(node);
            if (children.length === 0) return null;
            return { type: 'paragraph', content: children };
          }
          if (tag === 'ul') {
            return { type: 'bulletList', content: processChildren(node) };
          }
          if (tag === 'ol') {
            return { type: 'orderedList', content: processChildren(node) };
          }
          if (tag === 'li') {
            return { type: 'listItem', content: [{ type: 'paragraph', content: processChildren(node) }] };
          }
          if (tag === 'strong' || tag === 'b') {
            const children = processChildren(node);
            return children.map(c => c.type === 'text' ? { ...c, marks: [{ type: 'bold' }] } : c);
          }
          if (tag === 'em' || tag === 'i') {
            const children = processChildren(node);
            return children.map(c => c.type === 'text' ? { ...c, marks: [{ type: 'italic' }] } : c);
          }
          if (tag === 'blockquote') {
            return { type: 'blockquote', content: processChildren(node) };
          }
          if (tag === 'hr') {
            return { type: 'horizontalRule' };
          }
          if (tag === 'br') {
            return { type: 'hardBreak' };
          }

          // Default: process children
          return processChildren(node);
        }
        return null;
      }

      function processChildren(node) {
        const results = [];
        for (const child of node.childNodes) {
          const result = processNode(child);
          if (result) {
            if (Array.isArray(result)) {
              results.push(...result);
            } else {
              results.push(result);
            }
          }
        }
        return results;
      }

      for (const child of doc.body.childNodes) {
        const result = processNode(child);
        if (result) {
          if (Array.isArray(result)) {
            content.push(...result);
          } else {
            content.push(result);
          }
        }
      }

      return { type: 'doc', content };
    }

    function showStatus(message, type) {
      status.textContent = message;
      status.className = 'status ' + type;
    }
  </script>
</body>
</html>
