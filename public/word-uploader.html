<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word zu Blog Post | Tax and Purpose</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
  <style>
    :root {
      --text: #3C393A;
      --background: #f9e9ea;
      --primary: #D08C7C;
      --secondary: #ebcfc8;
      --accent: #7F2B3F;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      background: var(--background);
      color: var(--text);
      min-height: 100vh;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--accent);
      margin-bottom: 8px;
      font-size: 2.5rem;
      font-weight: 600;
    }

    .subtitle {
      color: var(--text);
      opacity: 0.7;
      margin-bottom: 32px;
      font-size: 1.1rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(127, 43, 63, 0.08);
    }

    .card h3 {
      font-family: 'Playfair Display', serif;
      color: var(--accent);
      margin: 0 0 16px 0;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .upload-area {
      border: 2px dashed var(--primary);
      border-radius: 16px;
      padding: 60px 20px;
      text-align: center;
      background: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent);
      background: var(--secondary);
    }

    .upload-area input { display: none; }

    .upload-icon {
      font-size: 56px;
      margin-bottom: 12px;
    }

    .upload-area p {
      margin: 4px 0;
      color: var(--text);
    }

    .upload-area p strong {
      color: var(--accent);
    }

    .form-group {
      margin: 20px 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--secondary);
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      background: white;
      color: var(--text);
      transition: all 0.2s ease;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(127, 43, 63, 0.1);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .preview {
      display: none;
    }

    .preview h3 {
      margin-top: 0;
    }

    .preview-content {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--secondary);
      padding: 20px;
      border-radius: 12px;
      background: #fdfafa;
    }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: #6a243a;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      background: var(--secondary);
      color: var(--text);
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
      margin-left: 12px;
    }

    .btn-secondary:hover {
      background: var(--accent);
      color: white;
    }

    .btn-secondary:disabled {
      border-color: var(--secondary);
      color: var(--text);
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      padding: 16px 20px;
      border-radius: 12px;
      margin: 20px 0;
      display: none;
      font-weight: 500;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
      border: 1px solid #c3e6cb;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
      border: 1px solid #f5c6cb;
    }

    .actions {
      margin-top: 24px;
    }

    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .login-input {
      flex: 1;
      min-width: 150px;
    }

    .login-hint {
      margin: 12px 0 0 0;
      font-size: 13px;
      color: var(--text);
      opacity: 0.6;
    }

    .logged-in-section {
      background: #d4edda;
      padding: 14px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #c3e6cb;
    }

    .logged-in-badge {
      color: #155724;
      font-weight: 500;
    }

    .btn-link {
      background: none;
      border: none;
      color: #155724;
      cursor: pointer;
      text-decoration: underline;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
    }

    .btn-link:hover {
      color: #0d3d16;
    }

    .file-name {
      margin-top: 16px;
      padding: 12px 16px;
      background: var(--secondary);
      border-radius: 10px;
      display: none;
      font-weight: 500;
      color: var(--accent);
    }

    /* Logo/branding */
    .brand {
      margin-bottom: 24px;
    }

    .brand img {
      height: 48px;
      width: auto;
    }
  </style>
</head>
<body>
  <div class="brand">
    <img src="/logo.svg" alt="Tax and Purpose">
  </div>

  <h1>Word zu Blog Post</h1>
  <p class="subtitle">Laden Sie Ihr Word-Dokument hoch, um es in einen Blog-Beitrag zu konvertieren.</p>

  <!-- Login Section -->
  <div id="loginSection" class="card">
    <h3>Anmeldung</h3>
    <div class="form-row">
      <input type="email" id="loginEmail" placeholder="E-Mail" class="login-input">
      <input type="password" id="loginPassword" placeholder="Passwort" class="login-input">
      <button class="btn btn-primary" id="loginBtn">Anmelden</button>
    </div>
    <p class="login-hint">Verwenden Sie Ihre Directus-Anmeldedaten</p>
  </div>

  <!-- Logged in indicator -->
  <div id="loggedInSection" class="logged-in-section" style="display: none;">
    <span class="logged-in-badge">✓ Angemeldet als <strong id="loggedInEmail"></strong></span>
    <button class="btn-link" id="logoutBtn">Abmelden</button>
  </div>

  <div class="upload-area" id="uploadArea">
    <div class="upload-icon">📄</div>
    <p><strong>Word-Datei hierher ziehen</strong></p>
    <p>oder klicken zum Auswählen</p>
    <input type="file" id="fileInput" accept=".docx">
  </div>
  <div class="file-name" id="fileName"></div>

  <div class="form-group">
    <label for="title">Titel</label>
    <input type="text" id="title" placeholder="Wird aus Dateiname extrahiert...">
  </div>

  <div class="form-group">
    <label for="summary">Zusammenfassung</label>
    <textarea id="summary" placeholder="Kurze Beschreibung des Artikels..."></textarea>
  </div>

  <div class="preview card" id="preview">
    <h3>Vorschau</h3>
    <div class="preview-content" id="previewContent"></div>
  </div>

  <div id="status" class="status"></div>

  <div class="actions">
    <button class="btn btn-primary" id="uploadBtn" disabled>
      In Directus hochladen
    </button>
    <button class="btn btn-secondary" id="copyBtn" disabled>
      HTML kopieren
    </button>
  </div>

  <script>
    const DIRECTUS_URL = 'https://directus.rapid-works.io';
    const CLIENT_ID = 1; // tax-purpose

    let htmlContent = '';
    let accessToken = sessionStorage.getItem('directus_token');
    let userEmail = sessionStorage.getItem('directus_email');

    const loginSection = document.getElementById('loginSection');
    const loggedInSection = document.getElementById('loggedInSection');
    const loggedInEmail = document.getElementById('loggedInEmail');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const titleInput = document.getElementById('title');
    const summaryInput = document.getElementById('summary');
    const preview = document.getElementById('preview');
    const previewContent = document.getElementById('previewContent');
    const uploadBtn = document.getElementById('uploadBtn');
    const copyBtn = document.getElementById('copyBtn');
    const status = document.getElementById('status');

    // Check if already logged in
    function updateAuthUI() {
      if (accessToken && userEmail) {
        loginSection.style.display = 'none';
        loggedInSection.style.display = 'flex';
        loggedInEmail.textContent = userEmail;
      } else {
        loginSection.style.display = 'block';
        loggedInSection.style.display = 'none';
      }
    }
    updateAuthUI();

    // Login handler
    loginBtn.addEventListener('click', async () => {
      const email = loginEmail.value.trim();
      const password = loginPassword.value;

      if (!email || !password) {
        showStatus('Bitte E-Mail und Passwort eingeben', 'error');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Wird angemeldet...';

      try {
        const res = await fetch(`${DIRECTUS_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (!res.ok) throw new Error('Anmeldung fehlgeschlagen');

        const data = await res.json();
        accessToken = data.data.access_token;
        userEmail = email;

        sessionStorage.setItem('directus_token', accessToken);
        sessionStorage.setItem('directus_email', email);

        updateAuthUI();
        showStatus('Erfolgreich angemeldet!', 'success');
      } catch (err) {
        showStatus('Anmeldung fehlgeschlagen: ' + err.message, 'error');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Anmelden';
      }
    });

    // Logout handler
    logoutBtn.addEventListener('click', () => {
      accessToken = null;
      userEmail = null;
      sessionStorage.removeItem('directus_token');
      sessionStorage.removeItem('directus_email');
      updateAuthUI();
      showStatus('Abgemeldet', 'success');
    });

    // Drag and drop
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files[0]) {
        handleFile(e.dataTransfer.files[0]);
      }
    });
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        handleFile(e.target.files[0]);
      }
    });

    async function handleFile(file) {
      if (!file.name.endsWith('.docx')) {
        showStatus('Bitte eine .docx Datei auswählen', 'error');
        return;
      }

      fileName.textContent = '📎 ' + file.name;
      fileName.style.display = 'block';

      // Extract title from filename
      const title = file.name
        .replace('.docx', '')
        .replace(/^\d+\.\s*/, '')
        .replace(/Artikel_/i, '')
        .replace(/_/g, ' ')
        .trim();
      titleInput.value = title;
      summaryInput.value = title;

      // Convert with mammoth
      try {
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.convertToHtml({ arrayBuffer });

        htmlContent = result.value;

        // Remove first h1 (title)
        htmlContent = htmlContent.replace(/<h1>.*?<\/h1>/, '');

        // Show preview
        previewContent.innerHTML = htmlContent;
        preview.style.display = 'block';

        uploadBtn.disabled = false;
        copyBtn.disabled = false;

        showStatus('Datei erfolgreich konvertiert!', 'success');
      } catch (err) {
        showStatus('Fehler beim Konvertieren: ' + err.message, 'error');
      }
    }

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(htmlContent).then(() => {
        showStatus('HTML in Zwischenablage kopiert!', 'success');
      });
    });

    uploadBtn.addEventListener('click', async () => {
      const title = titleInput.value.trim();
      const summary = summaryInput.value.trim();

      if (!title) {
        showStatus('Bitte einen Titel eingeben', 'error');
        return;
      }

      // Check if logged in
      if (!accessToken) {
        showStatus('Bitte zuerst anmelden', 'error');
        return;
      }

      uploadBtn.disabled = true;
      uploadBtn.textContent = 'Wird hochgeladen...';

      try {
        // Generate slug
        const slug = title
          .toLowerCase()
          .replace(/ä/g, 'ae').replace(/ö/g, 'oe')
          .replace(/ü/g, 'ue').replace(/ß/g, 'ss')
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-|-$/g, '');

        // Convert HTML to Tiptap JSON
        const tiptapJson = htmlToTiptapJson(htmlContent);

        // Create post
        const postRes = await fetch(`${DIRECTUS_URL}/items/posts`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${accessToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            title,
            slug,
            content: tiptapJson,
            summary,
            status: 'published',
            client: CLIENT_ID
          })
        });

        if (!postRes.ok) {
          const err = await postRes.text();
          // Check if token expired
          if (postRes.status === 401) {
            accessToken = null;
            userEmail = null;
            sessionStorage.removeItem('directus_token');
            sessionStorage.removeItem('directus_email');
            updateAuthUI();
            throw new Error('Sitzung abgelaufen. Bitte erneut anmelden.');
          }
          throw new Error(err);
        }

        const postData = await postRes.json();
        showStatus(`Erfolgreich hochgeladen! Post ID: ${postData.data.id}`, 'success');

      } catch (err) {
        showStatus('Fehler: ' + err.message, 'error');
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'In Directus hochladen';
      }
    });

    function htmlToTiptapJson(html) {
      // Simple HTML to Tiptap JSON converter
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const content = [];

      function processNode(node) {
        if (node.nodeType === Node.TEXT_NODE) {
          const text = node.textContent;
          if (text.trim()) {
            return { type: 'text', text };
          }
          return null;
        }

        if (node.nodeType === Node.ELEMENT_NODE) {
          const tag = node.tagName.toLowerCase();

          if (tag === 'h1') {
            return { type: 'heading', attrs: { level: 1 }, content: processChildren(node) };
          }
          if (tag === 'h2') {
            return { type: 'heading', attrs: { level: 2 }, content: processChildren(node) };
          }
          if (tag === 'h3') {
            return { type: 'heading', attrs: { level: 3 }, content: processChildren(node) };
          }
          if (tag === 'h4') {
            return { type: 'heading', attrs: { level: 4 }, content: processChildren(node) };
          }
          if (tag === 'p') {
            const children = processChildren(node);
            if (children.length === 0) return null;
            return { type: 'paragraph', content: children };
          }
          if (tag === 'ul') {
            return { type: 'bulletList', content: processChildren(node) };
          }
          if (tag === 'ol') {
            return { type: 'orderedList', content: processChildren(node) };
          }
          if (tag === 'li') {
            return { type: 'listItem', content: [{ type: 'paragraph', content: processChildren(node) }] };
          }
          if (tag === 'strong' || tag === 'b') {
            const children = processChildren(node);
            return children.map(c => c.type === 'text' ? { ...c, marks: [{ type: 'bold' }] } : c);
          }
          if (tag === 'em' || tag === 'i') {
            const children = processChildren(node);
            return children.map(c => c.type === 'text' ? { ...c, marks: [{ type: 'italic' }] } : c);
          }
          if (tag === 'blockquote') {
            return { type: 'blockquote', content: processChildren(node) };
          }
          if (tag === 'hr') {
            return { type: 'horizontalRule' };
          }
          if (tag === 'br') {
            return { type: 'hardBreak' };
          }

          // Default: process children
          return processChildren(node);
        }
        return null;
      }

      function processChildren(node) {
        const results = [];
        for (const child of node.childNodes) {
          const result = processNode(child);
          if (result) {
            if (Array.isArray(result)) {
              results.push(...result);
            } else {
              results.push(result);
            }
          }
        }
        return results;
      }

      for (const child of doc.body.childNodes) {
        const result = processNode(child);
        if (result) {
          if (Array.isArray(result)) {
            content.push(...result);
          } else {
            content.push(result);
          }
        }
      }

      return { type: 'doc', content };
    }

    function showStatus(message, type) {
      status.textContent = message;
      status.className = 'status ' + type;
    }
  </script>
</body>
</html>
